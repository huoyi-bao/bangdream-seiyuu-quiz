var SHARE_TEXT='我在 BanG Dream! 声优应援鉴定中匹配到了【{name}】！你也来测测：';

function render(){
 var app=document.getElementById('app');
 if(state==='intro')renderIntro(app);
 else if(state==='quiz')renderQuestion(app);
 else if(state==='egg')renderEgg(app);
 else if(state==='loading')renderLoading(app);
 else if(state==='result')renderResult(app);
}
function renderIntro(app){
 app.innerHTML='<div class="intro"><div class="intro-badge">'+BADGE_TEXT+'</div><h1>'+QUIZ_TITLE+'</h1><p class="sub">'+QUIZ_SUBTITLE+'</p><div class="bands"><span>Poppin\'Party</span><span>Afterglow</span><span>Pastel＊Palettes</span><span>Roselia</span><span>Hello, Happy World!</span><span class="hot">MyGO!!!!!</span><span class="mujica">Ave Mujica</span></div><button class="btn btn-main" style="max-width:260px;margin:0 auto;" onclick="startQuiz()">开始测试 →</button></div>';
}
function startQuiz(){
 if(!confirm('🎸 本测试涵盖五团 + MyGO!!!!! + Ave Mujica 主要女声优。\n确认开始鉴定？'))return;
 state='quiz';idx=0;answers=[];resultKey=null;
 var c=document.getElementById('app').parentElement;if(c)c.classList.remove('star-aura');
 render();
}
function renderQuestion(app){
 if(idx>=QUESTIONS.length){advance();return;}
 var q=QUESTIONS[idx],pct=Math.round((idx/QUESTIONS.length)*100),labels='ABCDEFGH';
 var html=(idx>0?'<button class="back-link" onclick="goBack()">← 上一题</button>':'')+
 '<div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div><div class="progress-text">'+(idx+1)+' / '+QUESTIONS.length+'</div></div>'+
 '<div class="q-num">第 '+(idx+1)+' 问</div><div class="q-text">'+q.q+'</div><div class="options">';
 for(var i=0;i<q.opts.length;i++)html+='<button class="opt-btn" onclick="answer('+i+')"><span class="opt-letter">'+(labels[i]||'?')+'</span>'+q.opts[i].t+'</button>';
 html+='</div>';app.innerHTML=html;
}
function answer(c){answers.push(QUESTIONS[idx].opts[c]);idx++;if(idx<QUESTIONS.length){render();return;}advance();}
function advance(){state=countPure()>=EGG_THRESHOLD?'egg':'loading';render();}
function countPure(){var n=0;for(var i=0;i<answers.length;i++)if(answers[i].pure)n++;return n;}
function goBack(){
 if(state==='egg'){answers.pop();idx--;state='quiz';render();return;}
 if(state==='quiz'&&idx>0){idx--;answers.pop();render();}
}
function renderEgg(app){
 var c=document.getElementById('app').parentElement;if(c)c.classList.add('star-aura');
 app.innerHTML='<div class="result" style="position:relative;"><div class="egg-rays"></div><div class="egg-star">⭐</div><div class="result-label" style="position:relative;z-index:1;">隐藏问题 · 真·BanG Dreamer</div><div class="q-text" style="margin-top:10px;position:relative;z-index:1;">你愿意把一生献给 BanG Dream! 吗？</div><p class="result-tagline" style="position:relative;z-index:1;">CiRCLE 必须问你。</p><button class="btn btn-yes" style="max-width:260px;margin:8px auto 0;position:relative;z-index:1;" onclick="chooseStar()">イッチャイチャ！ ☆</button><button class="btn btn-ghost btn-no" style="max-width:260px;margin:10px auto 0;position:relative;z-index:1;" onmouseenter="dodgeNo(this)" onclick="dodgeNo(this)">否</button><p class="notice" id="eggHint" style="visibility:hidden;position:relative;z-index:1;">Star Beat 不接受拒绝 ☆</p></div>';
}
function dodgeNo(btn){
 btn.style.transform='translate('+((Math.random()*2-1)*96).toFixed(0)+'px,'+((Math.random()*2-1)*34).toFixed(0)+'px)';
 var h=document.getElementById('eggHint');if(h)h.style.visibility='visible';
}
function chooseStar(){resultKey='star';state='loading';render();}
function renderLoading(app){
 app.innerHTML='<div class="loading-wrap"><div class="loading-orb"></div><p class="loading-text" id="ltxt">'+LOADING_STEPS[0]+'</p></div>';
 cycleLoading(1);
}
async function cycleLoading(i){
 if(i>=LOADING_STEPS.length){finishToResult();return;}
 await sleep(500+Math.random()*400);
 var lt=document.getElementById('ltxt');if(lt)lt.textContent=LOADING_STEPS[i];
 cycleLoading(i+1);
}
function finishToResult(){if(!resultKey)resultKey=calcResult();state='result';render();}
function calcResult(){
 var scores={};for(var i=0;i<SCORE_KEYS.length;i++)scores[SCORE_KEYS[i]]=0;
 for(var i=0;i<answers.length;i++){var s=answers[i].s||{};for(var k in s)if(scores[k]!=null)scores[k]+=s[k];}
 var best=-1;for(var i=0;i<SCORE_KEYS.length;i++)if(scores[SCORE_KEYS[i]]>best)best=scores[SCORE_KEYS[i]];
 var top=[];for(var i=0;i<SCORE_KEYS.length;i++)if(scores[SCORE_KEYS[i]]===best)top.push(SCORE_KEYS[i]);
 return top[Math.floor(Math.random()*top.length)];
}
function renderResult(app){
 var r=RESULTS[resultKey]||RESULTS[SCORE_KEYS[0]],isStar=(resultKey==='star');
 var c=document.getElementById('app').parentElement;
 if(c){if(isStar)c.classList.add('star-aura');else c.classList.remove('star-aura');}
 app.innerHTML='<div class="result"><div class="result-emoji'+(isStar?' egg-star':'')+'">'+r.emoji+'</div><div class="result-label">BanG Dream! 声优应援鉴定</div><div class="result-name'+(isStar?' golden-shimmer':'')+'" style="color:'+(isStar?'':(r.color||'var(--pink)'))+'">'+r.name+'</div><div class="result-role">'+r.role+'</div><div class="result-tagline">'+r.tagline+'</div><div class="result-desc">'+r.desc+'</div><div class="result-meta">'+r.tags.map(function(t){return'<span class="meta-tag">'+t+'</span>';}).join('')+'</div><button class="btn btn-main" onclick="shareIt()">📋 复制结果文案</button><button class="btn btn-ghost" onclick="restart()">🔄 再来一次</button><p class="notice">BanG Dream! Project · 结果仅供娱乐 · live 是真的</p></div>';
}
function shareIt(){
 var name=(resultKey&&RESULTS[resultKey])?RESULTS[resultKey].name:'';
 var text=SHARE_TEXT.replace('{name}',name)+' '+window.location.href;
 if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(text).then(function(){alert('已复制！发给 BanG Dreamer 朋友试试 🎸');}).catch(function(){prompt('复制：',text);});
 else prompt('复制：',text);
}
function restart(){
 var c=document.getElementById('app').parentElement;if(c)c.classList.remove('star-aura');
 state='intro';idx=0;answers=[];resultKey=null;render();
}
function sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}
render();
